name: Playwright Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:  # permite rodar manualmente pela interface do GitHub

jobs:
  test:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      database:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: bookshelf
          POSTGRES_PASSWORD: bookshelf
          POSTGRES_DB: bookshelf
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      BASE_URL: http://localhost:5173
      API_URL: http://localhost:3000
      DATABASE_URL: postgresql://bookshelf:bookshelf@localhost:5432/bookshelf
      JWT_SECRET: ci-test-secret
      NODE_ENV: test

    steps:
      - name: Checkout Playwright tests
        uses: actions/checkout@v4

      - name: Checkout Backend
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/bookshelf-api
          path: backend
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Frontend
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/bookshelf-fronentd
          path: frontend
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run database migrations
        working-directory: backend
        run: npm run migration:run || npx typeorm migration:run -d src/data-source.ts

      - name: Start backend
        working-directory: backend
        run: |
          npm run start:prod &
          npx wait-on http://localhost:3000/health --timeout 30000

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build and start frontend
        working-directory: frontend
        run: |
          npm run build
          npm run preview -- --port 5173 &
          npx wait-on http://localhost:5173 --timeout 30000

      - name: Install Playwright dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run Playwright tests (excluding visual)
        run: npx playwright test --ignore=tests/visual

      - name: Run visual regression tests
        run: npx playwright test tests/visual
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload visual snapshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-snapshots-diff
          path: test-results/
          retention-days: 7