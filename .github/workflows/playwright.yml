name: Playwright Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      database:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: bookshelf
          POSTGRES_PASSWORD: bookshelf
          POSTGRES_DB: bookshelf
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      BASE_URL: http://localhost:5173
      API_URL: http://localhost:3000
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: bookshelf
      DB_PASSWORD: bookshelf
      DB_NAME: bookshelf
      JWT_SECRET: ci-test-secret
      NODE_ENV: test

    steps:
      - name: Checkout Playwright tests
        uses: actions/checkout@v4

      - name: Checkout Backend
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/bookshelf-api
          path: backend
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Frontend
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/bookshelf-frontend
          path: frontend
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Start backend
        working-directory: backend
        run: |
          npm run start &
          npx wait-on http://localhost:3000/health --timeout 60000

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build and start frontend
        working-directory: frontend
        run: |
          npm run build
          npm run preview -- --port 5173 &
          npx wait-on http://localhost:5173 --timeout 30000

      - name: Install Playwright dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run Playwright tests (excluding visual and accessibility)
        run: npx playwright test tests/auth tests/books tests/dashboard tests/e2e tests/network

      - name: Commit updated Linux snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/**/*.png || true
          git diff --staged --quiet || git commit -m "ci: update Linux visual snapshots [skip ci]"
          git push origin master || true
        continue-on-error: true

      - name: Run visual regression tests
        run: npx playwright test tests/visual
        continue-on-error: true

      - name: Run accessibility tests
        run: npx playwright test tests/accessibility
        continue-on-error: true

      # ── Allure Report ────────────────────────────────────────────────────────
      - name: Generate Allure report
        if: always()
        run: npx allure generate --output allure-report

      - name: Upload Allure report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Deploy Allure report to GitHub Pages
        if: always() && github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          destination_dir: allure-report

      # ── Playwright HTML report (fallback) ────────────────────────────────────
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload visual diff on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-snapshots-diff
          path: test-results/
          retention-days: 7